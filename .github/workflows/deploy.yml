name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Le robot se lance quand tu pousses sur la branche main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web App
        # ⚠️ TRÈS IMPORTANT : Remplace 'TablAI' par le nom exact de ton dépôt GitHub (en respectant les majuscules)
        run: flutter build web --base-href "/GuitarTabsShared/"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web